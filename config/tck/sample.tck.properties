# DPS TCK sample configuration


# Configure the test package, typically you would test control-plane and data-plane separately
# so append ".controlplane" or ".dataplane" respectively.
dataspacetck.test.package=org.eclipse.dataspacetck.dps.verification

# URL the TCK will POST signaling messages to on the control-plane under test
tck.dps.controlplane.webhook.url=http://localhost:9191/api/v1/dataflows

# URL of the DSP protocol endpoint used by the TCK to drive negotiations
tck.dps.controlplane.protocol.url=http://localhost:8282/api/v1/dsp

# URL of the data-plane under test
tck.dps.dataplane.url=http://localhost:8585/api/v1/dataflows

# Authorization token sent in requests to the data-plane (defaults to "dummy-authorization")
tck.dps.dataplane.authorization=dummy-authorization

# Maximum time (seconds) the TCK waits for an async response
tck.dps.default.wait=15

# Contract agreement IDs for control-plane tests.
# Each control-plane test uses an agreementId that defaults to a random UUID.
# When testing against a real control plane you must pre-create a contract agreement
# and set the properties below to that agreement's ID.
# All tests can share the same agreement — set every property to the same value.
#CP_C_01_01_AGREEMENTID=<your-agreement-id>
#CP_C_01_02_AGREEMENTID=<your-agreement-id>
#CP_C_02_01_AGREEMENTID=<your-agreement-id>
#CP_C_02_02_AGREEMENTID=<your-agreement-id>
#CP_C_03_01_AGREEMENTID=<your-agreement-id>
#CP_P_01_01_AGREEMENTID=<your-agreement-id>
#CP_P_01_02_AGREEMENTID=<your-agreement-id>
#CP_P_02_01_AGREEMENTID=<your-agreement-id>
#CP_P_02_02_AGREEMENTID=<your-agreement-id>
#CP_P_03_01_AGREEMENTID=<your-agreement-id>

# TCK participant IDs for control-plane tests.
# The TCK identifies itself with these IDs when sending DSP messages.
# The contract agreement's participant IDs must match these values.
# CP_P tests: TCK acts as consumer (default: consumerId)
#CP_P_01_01_TCKPARTICIPANTID=consumerId
#CP_P_01_02_TCKPARTICIPANTID=consumerId
#CP_P_02_01_TCKPARTICIPANTID=consumerId
#CP_P_02_02_TCKPARTICIPANTID=consumerId
#CP_P_03_01_TCKPARTICIPANTID=consumerId
# CP_C tests: TCK acts as provider (default: providerId)
#CP_C_01_01_TCKPARTICIPANTID=providerId
#CP_C_01_02_TCKPARTICIPANTID=providerId
#CP_C_02_01_TCKPARTICIPANTID=providerId
#CP_C_02_02_TCKPARTICIPANTID=providerId
#CP_C_03_01_TCKPARTICIPANTID=providerId
